services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden

    restart: unless-stopped

    ports:
      - "${VAULTWARDEN_PORT}:80"

    environment:
      - SIGNUPS_ALLOWED=${SIGNUPS_ALLOWED}
      - WEBSOCKET_ENABLED=${WEBSOCKET_ENABLED}

    volumes:
      - ${VAULTWARDEN_DATA}:/data

    networks:
      - proxy_net

networks:
  proxy_net:
    external: true

services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - /opt/data/uptime-kuma:/app/data
    networks:
      - proxy_net
      - monitoring_net

networks:
  proxy_net:
    external: true
  monitoring_net:
    external: true
